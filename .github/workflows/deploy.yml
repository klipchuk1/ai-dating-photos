name: Deploy

on:
  push:
    branches: [master, main]

jobs:
  # ── Frontend → Vercel ──────────────────────────────────────────────────────
  frontend:
    name: Frontend → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Vercel pull
        run: npx vercel pull --yes --environment=production --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Vercel build (prebuilt — env baked here)
        run: npx vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VITE_API_URL:      ${{ secrets.VITE_API_URL }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Vercel deploy (prebuilt)
        run: npx vercel deploy --prebuilt --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Backend → VPS (SSH redeploy) ───────────────────────────────────────────
  backend:
    name: Backend → VPS
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/app
            git pull origin master
            docker build -t ai-dating-backend ./backend
            docker rm -f ai-dating-backend || true
            docker run -d \
              --name ai-dating-backend \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              --env-file /opt/app/backend/.env \
              -v /opt/app/backend/storage:/app/storage \
              ai-dating-backend
            echo "Backend redeployed OK"
